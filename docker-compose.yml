  #     - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
  #     - INPUT_TOPICS=signals_scalping,signals_momentum,binance_user_orders
  #     - NATS_URL=nats://nats:4222
  #   restart: unless-stopped

volumes:
  kafka_data:
