  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-js" # JetStream enabled

  api_gateway:
    build: ./services/api_gateway/
    depends_on:
      - kafka
      - nats
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - INPUT_TOPICS=signals_scalping,signals_momentum,binance_user_orders
      - NATS_URL=nats://nats:4222
    restart: unless-stopped

