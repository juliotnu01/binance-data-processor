<!DOCTYPE html>
<html>
<head>
    <title>Binance Trading Signals Monitor</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: #0f0f23; 
            color: #fff; 
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            padding: 20px; 
            background: #1a1a2e; 
            border-radius: 10px; 
            border: 1px solid #333; 
        }
        .status { 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            font-weight: bold; 
            text-align: center;
        }
        .connected { background: #155724; border: 1px solid #0f4; }
        .disconnected { background: #721c24; border: 1px solid #f00; }
        .topics-tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .topic-tab {
            padding: 10px 20px;
            background: #252540;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid #444;
            transition: all 0.3s ease;
        }
        .topic-tab.active {
            background: #00ffaa;
            color: #000;
            font-weight: bold;
        }
        .signals-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
        }
        .signal-card { 
            background: #1a1a2e; 
            padding: 20px; 
            border-radius: 10px; 
            border: 1px solid #333; 
            transition: all 0.3s ease; 
        }
        .signal-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(0,255,0,0.1); 
        }
        .signal-trade { border-left: 4px solid #00aaff; }
        .signal-scalping { border-left: 4px solid #ffaa00; }
        .signal-momentum { border-left: 4px solid #aa00ff; }
        .signal-user { border-left: 4px solid #00ffaa; }
        .symbol { 
            font-size: 1.4em; 
            font-weight: bold; 
            margin-bottom: 10px; 
            color: #00ffaa; 
        }
        .event-type { 
            font-size: 1.1em; 
            font-weight: bold; 
            margin: 10px 0; 
            padding: 5px 10px; 
            border-radius: 5px; 
            background: #252540;
            display: inline-block; 
        }
        .price { 
            font-size: 1.3em; 
            font-weight: bold; 
            color: #ffff00; 
            margin: 10px 0; 
        }
        .quantity {
            font-size: 1.1em;
            color: #ffaa00;
            margin: 5px 0;
        }
        .info-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-top: 15px; 
        }
        .info-item { 
            background: #252540; 
            padding: 8px; 
            border-radius: 5px; 
            font-size: 0.9em; 
        }
        .info-label { color: #888; font-size: 0.8em; }
        .info-value { color: #fff; font-weight: bold; }
        .timestamp { 
            font-size: 0.8em; 
            color: #888; 
            margin-top: 10px; 
            text-align: right; 
        }
        .topic-badge { 
            background: #333; 
            padding: 2px 8px; 
            border-radius: 12px; 
            font-size: 0.8em; 
            display: inline-block; 
            margin-bottom: 10px; 
        }
        .stats { 
            display: flex; 
            justify-content: space-around; 
            margin: 20px 0; 
            background: #1a1a2e; 
            padding: 15px; 
            border-radius: 10px; 
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5em; font-weight: bold; color: #00ffaa; }
        .stat-label { font-size: 0.9em; color: #888; }
        .market-maker { color: #00aaff; font-weight: bold; }
        .market-taker { color: #ff4444; font-weight: bold; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Binance Trading Data Monitor</h1>
            <p>Monitoreo en tiempo real de datos de Binance Futures</p>
        </div>

        <div id="status" class="status disconnected">
            🔴 Desconectado del servidor
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalMessages">0</div>
                <div class="stat-label">Total Mensajes</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="tradesCount">0</div>
                <div class="stat-label">Trades</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="signalsCount">0</div>
                <div class="stat-label">Señales</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="activeTopics">0</div>
                <div class="stat-label">Tópicos Activos</div>
            </div>
        </div>

        <div class="topics-tabs" id="topicsTabs">
            <!-- Tabs se generan dinámicamente -->
        </div>

        <div id="signals" class="signals-grid">
            <div class="empty-state">
                📡 Esperando datos en tiempo real...
            </div>
        </div>
    </div>

    <script>
        class BinanceDataMonitor {
            constructor() {
                this.socket = null;
                this.totalMessages = 0;
                this.tradesCount = 0;
                this.signalsCount = 0;
                this.activeTopics = new Set();
                this.maxMessages = 100;
                this.currentFilter = 'all';
                
                this.initializeSocket();
                this.setupEventListeners();
            }

            initializeSocket() {
                this.socket = io('http://localhost:8080');
                
                this.socket.on('connect', () => {
                    this.updateStatus('🟢 Conectado - Recibiendo datos en tiempo real', 'connected');
                    console.log('✅ Conectado al servidor');
                });

                this.socket.on('disconnect', () => {
                    this.updateStatus('🔴 Desconectado - Intentando reconectar...', 'disconnected');
                    console.log('❌ Desconectado del servidor');
                });

                this.socket.on('data_update', (data) => {
                    this.handleNewData(data);
                });

                this.socket.on('error', (error) => {
                    console.error('Error en WebSocket:', error);
                    this.updateStatus('⚠️ Error de conexión', 'disconnected');
                });
            }

            handleNewData(data) {
                this.totalMessages++;
                this.activeTopics.add(data.topic);
                
                // Contar por tipo
                if (data.topic.includes('trade')) {
                    this.tradesCount++;
                } else if (data.topic.includes('signal')) {
                    this.signalsCount++;
                }
                
                this.updateStats();
                this.displayData(data);
                this.updateTopicsTabs();
                
                console.log('📨 Dato recibido:', data);
            }

            displayData(data) {
                const signalsContainer = document.getElementById('signals');
                
                // Remover empty state si existe
                const emptyState = signalsContainer.querySelector('.empty-state');
                if (emptyState) {
                    emptyState.remove();
                }

                // Aplicar filtro
                if (this.currentFilter !== 'all' && data.topic !== this.currentFilter) {
                    return;
                }

                const signalElement = document.createElement('div');
                const topicClass = this.getTopicClass(data.topic);
                
                signalElement.className = `signal-card ${topicClass}`;
                signalElement.innerHTML = this.generateCardHTML(data);
                
                // Agregar al inicio
                signalsContainer.insertBefore(signalElement, signalsContainer.firstChild);
                
                // Limitar mensajes
                while (signalsContainer.children.length > this.maxMessages) {
                    signalsContainer.removeChild(signalsContainer.lastChild);
                }
            }

            generateCardHTML(data) {
                const topicIcon = this.getTopicIcon(data.topic);
                const isTrade = data.topic.includes('trade');
                const isSignal = data.topic.includes('signal');
                
                if (isTrade) {
                    return this.generateTradeCardHTML(data, topicIcon);
                } else if (isSignal) {
                    return this.generateSignalCardHTML(data, topicIcon);
                } else {
                    return this.generateGenericCardHTML(data, topicIcon);
                }
            }

            generateTradeCardHTML(data, topicIcon) {
                const tradeData = data.data;
                const isMaker = tradeData.m;
                const tradeType = isMaker ? 'MAKER' : 'TAKER';
                const tradeTypeClass = isMaker ? 'market-maker' : 'market-taker';
                
                return `
                    <div class="topic-badge">${topicIcon} ${data.topic}</div>
                    <div class="symbol">${tradeData.s || 'Unknown'}</div>
                    <div class="event-type ${tradeTypeClass}">${tradeData.e || 'trade'} • ${tradeType}</div>
                    <div class="price">$${this.formatPrice(tradeData.p)}</div>
                    <div class="quantity">Cantidad: ${this.formatQuantity(tradeData.q)}</div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Trade ID</div>
                            <div class="info-value">${tradeData.t || 'N/A'}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Event Time</div>
                            <div class="info-value">${this.formatTimestamp(tradeData.E)}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Trade Time</div>
                            <div class="info-value">${this.formatTimestamp(tradeData.T)}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Buyer Maker</div>
                            <div class="info-value">${tradeData.m ? 'Sí' : 'No'}</div>
                        </div>
                    </div>
                    
                    <div class="timestamp">
                        Recibido: ${new Date().toLocaleTimeString()}
                    </div>
                `;
            }

            generateSignalCardHTML(data, topicIcon) {
                const signalData = data.data;
                
                return `
                    <div class="topic-badge">${topicIcon} ${data.topic}</div>
                    <div class="symbol">${signalData.symbol || 'Unknown'}</div>
                    <div class="event-type" style="background: ${signalData.signal === 'BUY' ? '#155724' : '#721c24'}; color: ${signalData.signal === 'BUY' ? '#0f4' : '#f44'}">
                        ${signalData.signal || 'NO_SIGNAL'}
                    </div>
                    <div class="price">$${this.formatPrice(signalData.price)}</div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Algoritmo</div>
                            <div class="info-value">${signalData.algorithm || 'N/A'}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">SMA</div>
                            <div class="info-value">${this.formatPrice(signalData.sma)}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Banda Superior</div>
                            <div class="info-value">${this.formatPrice(signalData.upper_band)}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Banda Inferior</div>
                            <div class="info-value">${this.formatPrice(signalData.lower_band)}</div>
                        </div>
                    </div>
                    
                    <div class="timestamp">
                        ${new Date().toLocaleTimeString()}
                    </div>
                `;
            }

            generateGenericCardHTML(data, topicIcon) {
                return `
                    <div class="topic-badge">${topicIcon} ${data.topic}</div>
                    <div class="symbol">Datos Generales</div>
                    <pre style="background: #252540; padding: 10px; border-radius: 5px; overflow: auto; font-size: 0.8em;">${JSON.stringify(data.data, null, 2)}</pre>
                    <div class="timestamp">
                        ${new Date().toLocaleTimeString()}
                    </div>
                `;
            }

            getTopicClass(topic) {
                if (topic.includes('trade')) return 'signal-trade';
                if (topic.includes('scalping')) return 'signal-scalping';
                if (topic.includes('momentum')) return 'signal-momentum';
                if (topic.includes('user')) return 'signal-user';
                return 'signal-trade';
            }

            getTopicIcon(topic) {
                if (topic.includes('trade')) return '💰';
                if (topic.includes('scalping')) return '⚡';
                if (topic.includes('momentum')) return '📊';
                if (topic.includes('user')) return '👤';
                return '📨';
            }

            updateStats() {
                document.getElementById('totalMessages').textContent = this.totalMessages;
                document.getElementById('tradesCount').textContent = this.tradesCount;
                document.getElementById('signalsCount').textContent = this.signalsCount;
                document.getElementById('activeTopics').textContent = this.activeTopics.size;
            }

            updateTopicsTabs() {
                const tabsContainer = document.getElementById('topicsTabs');
                const topics = Array.from(this.activeTopics);
                
                tabsContainer.innerHTML = `
                    <div class="topic-tab ${this.currentFilter === 'all' ? 'active' : ''}" data-topic="all">
                        📊 Todos (${this.totalMessages})
                    </div>
                    ${topics.map(topic => `
                        <div class="topic-tab ${this.currentFilter === topic ? 'active' : ''}" data-topic="${topic}">
                            ${this.getTopicIcon(topic)} ${topic} (${this.getTopicCount(topic)})
                        </div>
                    `).join('')}
                `;
                
                // Agregar event listeners a los tabs
                tabsContainer.querySelectorAll('.topic-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        this.currentFilter = tab.dataset.topic;
                        this.updateTopicsTabs();
                        this.refreshDisplay();
                    });
                });
            }

            getTopicCount(topic) {
                // Esto sería más preciso con un contador por topic
                return Math.floor(this.totalMessages / this.activeTopics.size);
            }

            refreshDisplay() {
                const signalsContainer = document.getElementById('signals');
                signalsContainer.innerHTML = '<div class="empty-state">📡 Aplicando filtro...</div>';
                
                // En una implementación real, aquí reconstruirías la vista con los datos filtrados
                // Por simplicidad, recargamos la página
                setTimeout(() => location.reload(), 100);
            }

            updateStatus(message, className) {
                const statusElement = document.getElementById('status');
                statusElement.textContent = message;
                statusElement.className = `status ${className}`;
            }

            formatPrice(price) {
                if (!price || price === 0) return 'N/A';
                return new Intl.NumberFormat('en-US', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 6
                }).format(parseFloat(price));
            }

            formatQuantity(qty) {
                if (!qty) return 'N/A';
                return parseFloat(qty).toFixed(6);
            }

            formatTimestamp(timestamp) {
                if (!timestamp) return 'N/A';
                return new Date(timestamp).toLocaleTimeString();
            }

            setupEventListeners() {
                document.getElementById('status').addEventListener('click', () => {
                    if (!this.socket.connected) {
                        this.socket.connect();
                    }
                });
            }
        }

        // Inicializar el monitor
        document.addEventListener('DOMContentLoaded', () => {
            window.dataMonitor = new BinanceDataMonitor();
        });
    </script>
</body>
</html>
